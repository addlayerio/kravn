name: release

# Build the Kravn MCP gateway image and publish image + Helm chart to the REPO OWNER's GHCR
# (ghcr.io/<owner>), so it can be installed on any cluster without living in another org.
#
# Push a tag like v0.1.0 to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Then install on the target cluster (e.g. Worldsys):
#   helm install kravn oci://ghcr.io/<owner>/charts/kravn --version 0.1.0
#
# GHCR auth uses the built-in GITHUB_TOKEN — no extra secrets needed. On the FIRST publish the
# packages are private; make them public (or pull with an imagePullSecret) from the repo's Packages page.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v), e.g. 0.1.0'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign signing via GitHub OIDC (Sigstore Fulcio/Rekor)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + lowercase owner
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push gateway image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/kravn:${{ steps.vars.outputs.version }}
            ghcr.io/${{ steps.vars.outputs.owner }}/kravn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain assurance (all free, no third parties): attach a CycloneDX SBOM (the "bill of
          # materials" of every dependency in the image) and max-mode SLSA build provenance (a tamper-proof
          # record of which commit/workflow built it) to the image in the registry.
          sbom: true
          provenance: mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        env:
          IMAGE: ghcr.io/${{ steps.vars.outputs.owner }}/kravn
          DIGEST: ${{ steps.build.outputs.digest }}
        # Keyless: cosign gets a short-lived cert from Fulcio bound to this workflow's OIDC identity and
        # records the signature in the public Rekor transparency log. No keys to manage.
        # Retry: the ambient GitHub-OIDC token fetch can transiently return a non-JSON error
        # ("fetching ambient OIDC credentials: invalid character 'u'…") under load — retry before failing.
        run: |
          for i in 1 2 3 4 5; do
            cosign sign --yes "${IMAGE}@${DIGEST}" && exit 0
            echo "::warning::cosign sign (image) attempt $i failed — retrying in $((i*5))s"
            sleep $((i*5))
          done
          echo "::error::cosign sign (image) failed after 5 attempts"; exit 1

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Package + push + sign Helm chart (OCI)
        run: |
          set -euo pipefail
          OWNER="${{ steps.vars.outputs.owner }}"
          VERSION="${{ steps.vars.outputs.version }}"
          # Point the chart's default image at this owner's GHCR so `helm install` needs zero overrides.
          sed -i "s|ghcr.io/OWNER/kravn|ghcr.io/${OWNER}/kravn|" charts/kravn/values.yaml
          helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          helm package charts/kravn --version "${VERSION}" --app-version "${VERSION}"
          PUSH_OUT=$(helm push "kravn-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts" 2>&1)
          echo "${PUSH_OUT}"
          CHART_DIGEST=$(echo "${PUSH_OUT}" | awk '/[Dd]igest:/{print $2}')
          # Sign the chart artifact too (keyless), so the whole release — image AND chart — is verifiable.
          # Retry: the ambient OIDC token fetch can transiently fail ("invalid character 'u'…") under load.
          for i in 1 2 3 4 5; do
            cosign sign --yes "ghcr.io/${OWNER}/charts/kravn@${CHART_DIGEST}" && break
            echo "::warning::cosign sign (chart) attempt $i failed — retrying in $((i*5))s"
            sleep $((i*5))
            [ "$i" = 5 ] && { echo "::error::cosign sign (chart) failed after 5 attempts"; exit 1; }
          done

      - name: Summary
        run: |
          OWNER="${{ steps.vars.outputs.owner }}"
          VERSION="${{ steps.vars.outputs.version }}"
          {
            echo "### Kravn ${VERSION} published 🚀"
            echo ""
            echo "**Image:** \`ghcr.io/${OWNER}/kravn:${VERSION}\`"
            echo "**Chart:** \`oci://ghcr.io/${OWNER}/charts/kravn\` (version ${VERSION})"
            echo ""
            echo "Install:"
            echo '```sh'
            echo "helm install kravn oci://ghcr.io/${OWNER}/charts/kravn --version ${VERSION}"
            echo '```'
            echo ""
            echo "**Supply chain:** the image ships a CycloneDX **SBOM** + **SLSA build provenance**, and both"
            echo "image and chart are **cosign-signed** (keyless). Verify:"
            echo '```sh'
            echo "cosign verify ghcr.io/${OWNER}/kravn:${VERSION} \\"
            echo "  --certificate-identity-regexp '^https://github.com/${OWNER}/kravn/.github/workflows/release.yml@' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo "docker buildx imagetools inspect ghcr.io/${OWNER}/kravn:${VERSION} --format '{{ json .SBOM }}'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
