apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kravn.fullname" . }}
  labels:
    {{- include "kravn.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kravn.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kravn.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kravn
          image: {{ include "kravn.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: KRAVN_DATA_DIR
              value: /data
            {{- if .Values.role }}
            - name: KRAVN_ROLE
              value: {{ .Values.role | quote }}
            {{- end }}
            {{- if .Values.publicUrl }}
            - name: KRAVN_PUBLIC_URL
              value: {{ .Values.publicUrl | quote }}
            {{- end }}
            {{- if .Values.clientUrl }}
            - name: KRAVN_CLIENT_URL
              value: {{ .Values.clientUrl | quote }}
            {{- end }}
            {{- include "kravn.dbEnv" . | nindent 12 }}
            {{- include "kravn.redisEnv" . | nindent 12 }}
            {{- if or .Values.secret .Values.existingSecret }}
            - name: KRAVN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "kravn.fullname" .)) }}
                  key: {{ .Values.existingSecretKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "kravn.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
