name: release

# Build the Kravn MCP gateway image and publish image + Helm chart to the REPO OWNER's GHCR
# (ghcr.io/<owner>), so it can be installed on any cluster without living in another org.
#
# Push a tag like v0.1.0 to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Then install on the target cluster (e.g. Worldsys):
#   helm install kravn oci://ghcr.io/<owner>/charts/kravn --version 0.1.0
#
# GHCR auth uses the built-in GITHUB_TOKEN — no extra secrets needed. On the FIRST publish the
# packages are private; make them public (or pull with an imagePullSecret) from the repo's Packages page.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v), e.g. 0.1.0'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + lowercase owner
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/kravn:${{ steps.vars.outputs.version }}
            ghcr.io/${{ steps.vars.outputs.owner }}/kravn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Package + push Helm chart (OCI)
        run: |
          set -euo pipefail
          OWNER="${{ steps.vars.outputs.owner }}"
          VERSION="${{ steps.vars.outputs.version }}"
          # Point the chart's default image at this owner's GHCR so `helm install` needs zero overrides.
          sed -i "s|ghcr.io/OWNER/kravn|ghcr.io/${OWNER}/kravn|" charts/kravn/values.yaml
          helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          helm package charts/kravn --version "${VERSION}" --app-version "${VERSION}"
          helm push "kravn-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts"

      - name: Summary
        run: |
          OWNER="${{ steps.vars.outputs.owner }}"
          VERSION="${{ steps.vars.outputs.version }}"
          {
            echo "### Kravn ${VERSION} published 🚀"
            echo ""
            echo "**Image:** \`ghcr.io/${OWNER}/kravn:${VERSION}\`"
            echo "**Chart:** \`oci://ghcr.io/${OWNER}/charts/kravn\` (version ${VERSION})"
            echo ""
            echo "Install:"
            echo '```sh'
            echo "helm install kravn oci://ghcr.io/${OWNER}/charts/kravn --version ${VERSION}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
