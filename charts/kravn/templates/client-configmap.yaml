{{- if .Values.client.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kravn.client.fullname" . }}
  labels:
    {{- include "kravn.client.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # Chat attachments — don't let nginx's 1m default reject uploads before they reach the gateway.
      client_max_body_size {{ .Values.client.maxBodySize | default "50m" }};

      # API + auth/SSO/OAuth: reverse-proxy to the gateway Service. The SPA calls same-origin /api paths,
      # so from the browser everything is one origin (no CORS); nginx forwards it to the API server-side.
      location /api/ {
        proxy_pass http://{{ include "kravn.fullname" . }}:{{ .Values.service.port }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # long chat completions / SSE streams
        proxy_buffering off;       # stream Server-Sent Events without buffering
      }

      # SPA history-mode fallback.
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
{{- end }}
