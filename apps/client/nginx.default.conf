# Standalone default (docker run) — serves the SPA with history-mode fallback, no API proxy.
# In Kubernetes this file is REPLACED by the Helm ConfigMap (which also reverse-proxies /api to the gateway).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
