# Kravn Helm values.
# Designed to `helm install kravn ./charts/kravn` with ZERO overrides:
#   - SQLite on a small PVC (no external DB), secret auto-generated and persisted.
#   - No Ingress, no ServiceMonitor, no CRDs required.
#   - SSRF allows in-cluster networks by default (configurable later in the UI).
# Harden / scale later by enabling the sections below.

replicaCount: 1

image:
  # Published by CI to the repo owner's GHCR. The release workflow rewrites this to ghcr.io/<owner>/kravn
  # when packaging the chart, so `helm install` works with zero overrides.
  repository: ghcr.io/OWNER/kravn
  tag: ""        # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Which slice of the backend this deployment serves (same image):
#   all     -> everything (control-plane API + MCP endpoint + operator UI + chat). Default.
#   gateway -> control-plane API + MCP endpoint + operator UI only (no end-user chat / code interpreter).
#   chat    -> end-user chat API only.
# For a pure MCP gateway at minimal memory, set role: gateway (the Pyodide code interpreter never loads).
role: "all"

# Externally-visible URL (OAuth callbacks / absolute links). Empty -> derived from the incoming request.
publicUrl: ""
# Base URL of the separate end-user client app (only needed if you deploy apps/client AND use SSO from it).
clientUrl: ""

service:
  type: ClusterIP
  port: 80

# Persistent storage for the embedded SQLite DB + auto-generated secret key.
# Required for single-replica zero-config operation. Disable only when using Postgres
# AND providing `secret` below (so restarts keep a stable signing key).
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# Optional external database (PostgreSQL / MySQL·MariaDB / SQL Server). When enabled, set `url`
# (or point at an existing secret). Unset -> embedded SQLite on the PVC. Takes precedence over `postgres`.
#   postgres://user:pass@host:5432/db?sslmode=require
#   mysql://user:pass@host:3306/db
#   sqlserver://user:pass@host:1433/db?encrypt=true
database:
  enabled: false
  url: ""
  existingSecret: ""      # secret containing key DATABASE_URL
  existingSecretKey: DATABASE_URL
  # Build all tables inside this schema (PostgreSQL + SQL Server); auto-created if missing. Empty -> default.
  # PostgreSQL: applied via searchPath. RECOMMENDED on managed Postgres (PG 15+/Azure) because "public" is
  # not writable by a non-owner: either pre-create the schema owned by the app user
  # (CREATE SCHEMA <s> AUTHORIZATION <user> -- no CREATE-on-database needed) or grant the user CREATE on the
  # database. SQL Server: applied by repointing the login DEFAULT_SCHEMA — use a NON-sysadmin login (a
  # sysadmin like "sa" maps to dbo and the schema is ignored with a warning).
  # Not applicable to SQLite; on MySQL the schema is the database (set it in the url).
  schema: ""

# Deprecated alias for `database` (Postgres-only). Prefer `database` above.
postgres:
  enabled: false
  url: ""
  existingSecret: ""
  existingSecretKey: DATABASE_URL

# Schema migrations. When an external database is configured, the chart AUTOMATICALLY runs a
# pre-install/pre-upgrade hook Job that migrates the schema ONCE before the pods roll (Helm waits for it).
# This needs no configuration — it just happens. With embedded SQLite there's no shared database, so each
# pod migrates its own file on boot and no Job is rendered. `enabled` is only an escape hatch for operators
# who apply migrations out-of-band (e.g. from CI); leave it true for the normal flow.
migrations:
  job:
    enabled: true
    backoffLimit: 3
    activeDeadlineSeconds: 600
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi

# Shared signing/encryption secret. Leave empty for single-replica (auto-generated on the PVC).
# REQUIRED for replicaCount > 1 so all pods share one key. Provide directly or via existingSecret.
secret: ""
existingSecret: ""        # secret containing key KRAVN_SECRET
existingSecretKey: KRAVN_SECRET

# Cross-replica shared store for the brute-force rate limiter and in-flight OIDC login state.
# NEEDED when replicaCount > 1: without it each pod limits brute force independently, and an OIDC login
# started on one pod can fail its callback on another. A single replica works fine without this.
#
# Kravn speaks the Redis wire protocol, but enabling this deploys **Dragonfly** (RESP-compatible, single
# in-memory node) — not Redis — and wires the app to it at redis://<release>-dragonfly:6379.
# To use your OWN managed Redis / Valkey / Dragonfly instead, leave enabled=false and set externalUrl
# (or existingSecret). The store is best-effort: if it's unreachable the app degrades to per-pod limiting,
# it never crashes.
redis:
  enabled: false
  image:
    repository: docker.dragonflydb.io/dragonflydb/dragonfly
    tag: "v1.36.0"
    pullPolicy: IfNotPresent
  # Dragonfly starts one io-thread per CPU by default and refuses to boot unless maxMemory >=
  # proactorThreads x 256MiB. The shared state is tiny, so we pin ONE thread and a small cap — keep the
  # invariant (maxMemory >= proactorThreads x 256MiB) if you raise threads for a heavier workload.
  proactorThreads: 1
  maxMemory: "256mb"
  # Give RSS headroom ABOVE the data cap (proactor stacks, allocator arenas, connection buffers) so the pod
  # isn't OOMKilled while Dragonfly is still under its own maxMemory. Rule of thumb: limit ≈ 2x maxMemory.
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Defense-in-depth: restrict who may reach the bundled Dragonfly (it holds PKCE verifiers + rate-limit
  # state) to the Kravn app pods only. No-op on clusters whose CNI doesn't enforce NetworkPolicy. The bundled
  # instance has no password; for stronger auth use an external managed store via externalUrl/existingSecret
  # (a redis://:password@host URL).
  networkPolicy:
    enabled: true
  # BYO external Redis-protocol URL (redis:// or rediss://). Used ONLY when enabled=false.
  externalUrl: ""
  existingSecret: ""       # secret containing key KRAVN_REDIS_URL (overrides externalUrl when enabled=false)
  existingSecretKey: KRAVN_REDIS_URL

# Extra environment (advanced; most config lives in the app UI, not here).
extraEnv: []
#  - name: KRAVN_PUBLIC_URL
#    value: https://kravn.example.com

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kravn.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

metrics:
  serviceMonitor:
    enabled: false        # requires the Prometheus Operator CRD
    interval: 30s
    labels: {}

resources:
  # The default (role: all) ships the Pyodide code interpreter, whose WASM sandbox is capped at ~768MB
  # per run — so the pod needs headroom. For a pure gateway (role: gateway) you can lower the limit to ~512Mi.
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1280Mi

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
