name: Mirror Trivy DB to GHCR

# Mirror the Trivy vulnerability databases into THIS repo's own GHCR (where Kravn lives), once a day, so the
# image scan in release.yml pulls the DB from our registry instead of the public ghcr.io/aquasecurity/* —
# a controlled source with no public-registry pull rate limits. Uses skopeo + the built-in GITHUB_TOKEN; no
# external registry or secrets. Run it once manually the first time so the DB exists before the first release.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *' # once a day, 05:00 UTC

permissions:
  contents: read
  packages: write # push the mirrored DB into this owner's GHCR

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to GHCR
        run: skopeo login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

      # trivy-db is tagged with its schema version (2); trivy-java-db with 1. Mirror those exact tags; the
      # scan (release.yml) points TRIVY_DB_REPOSITORY / TRIVY_JAVA_DB_REPOSITORY at these tagged copies.
      - name: Mirror trivy-db
        run: |
          skopeo copy --all \
            docker://ghcr.io/aquasecurity/trivy-db:2 \
            docker://ghcr.io/${{ steps.vars.outputs.owner }}/trivy-db:2

      - name: Mirror trivy-java-db
        run: |
          skopeo copy --all \
            docker://ghcr.io/aquasecurity/trivy-java-db:1 \
            docker://ghcr.io/${{ steps.vars.outputs.owner }}/trivy-java-db:1
