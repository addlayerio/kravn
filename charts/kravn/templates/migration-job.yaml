{{- if and .Values.migrations.job.enabled (or .Values.database.enabled .Values.postgres.enabled) }}
# Migrate the schema ONCE before the app rolls out, as a Helm pre-install/pre-upgrade hook. Helm waits
# for this Job to succeed before creating/updating the Deployment, so the pods always start against an
# up-to-date schema. Rendered automatically whenever an external database is configured (with embedded
# SQLite there is no shared database to migrate, so each pod just migrates its own file on boot).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kravn.fullname" . }}-migrate
  labels:
    {{- include "kravn.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.job.backoffLimit }}
  {{- with .Values.migrations.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "kravn.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "kravn.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # Apply the schema and exit (the rest of the app never starts in this Job).
          command: ["node", "apps/gateway/dist/main.js", "migrate"]
          env:
            # The migration process is stateless (no SQLite file, no secret.key); /tmp is always writable.
            - name: KRAVN_DATA_DIR
              value: /tmp
            {{- include "kravn.dbEnv" . | nindent 12 }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrations.job.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
