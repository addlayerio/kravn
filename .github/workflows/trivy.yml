name: Trivy image scan

# Daily vulnerability scan of the published Kravn image in this repo's GHCR. Results are uploaded to the
# repository's Security tab (Code scanning). Reporting only — it does not fail; the release pipeline is where
# a build-time scan lives (release.yml). Trivy pulls a fresh vulnerability DB on each run, so a once-a-day
# cadence keeps findings current without noise.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # once a day, 06:00 UTC

permissions:
  contents: read
  packages: read # pull the image from GHCR
  security-events: write # upload SARIF to the Security tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan the Kravn image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ steps.vars.outputs.owner }}/kravn:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true # only vulns with a fix available — actionable

      - name: Upload results to the Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true # needs Code scanning enabled (free on public repos)
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
